# image display
wifi:
  on_connect:
    # - lambda: |-
    #     ESP_LOGI("wifi", "Wifi connected successfully");
    - logger.log: "Connected to WiFi! 2"
    - delay: 5s
    # - lambda: |-
    #     ESP_LOGI("wifi", "Updating component..");
    - logger.log: "Updating component.. 2"
    - component.update: my_image
    # - component.update: my_display

# image:
#   - id: my_image
#     file: "assets/image-generated.bmp"
#     type: RGB

http_request:
  id: my_http  
  timeout: 10s #10s
  verify_ssl: false
  watchdog_timeout: 20s #60s

online_image:
  - id: my_image
    url: "http://${DOMAIN_EXTERN_DEV}/lan/assets/image-indexed-8bit.png"
    format: PNG
    # type: RGB
    # type: RGB565
    type: GRAYSCALE
    # resize: 800x480
    # resize: 400x240
    # resize: 200x120
    on_download_finished:
      - logger.log: 
          format: "Image downloaded! Width: %d, Height: %d"
          args: ['id(my_image).get_width()', 'id(my_image).get_height()']
      - delay: 500ms
      - component.update: my_display
    on_error: 
      - logger.log: 
          format: "Image download error: %s"
          args: ['x.c_str()']



display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: $PIN_DISPLAY_CS
    dc_pin: $PIN_DISPLAY_DC
    busy_pin:
      number: $PIN_DISPLAY_BUSY
      inverted: true
    reset_pin: $PIN_DISPLAY_RESET
    model: 7.30in-f
    # reset_duration: 2ms
    # every 30 partial updates, not 30 seconds, N/A
    # full_update_every: 30
    # auto_clear_enabled: true
    # update_interval: 100min
    update_interval: never
