      - [0xC9, 0xAA]
      - [0xD0, 0x10]
      - [0xD1, 0x47]
      - [0xD2, 0x56]
      - [0xD3, 0x65]
      - [0xD4, 0x74]
      - [0xD5, 0x88]
      - [0xD6, 0x99]
      - [0xD7, 0x01]
      - [0xD8, 0xBB]
      - [0xD9, 0xAA]
      - [0xF3, 0x01]
      - [0xF0, 0x00]
      - [0x3A, 0x55]
      - [0x36, 0x00]
      - [0x2A, 0x00, 0x00, 0x01, 0x67]
      - [0x2B, 0x00, 0x00, 0x01, 0x67]
      - [0x11, 0x00]
      - delay 120ms
      - [0x29, 0x00]
      - delay 20ms
    lambda: |-
      const int W = 360, H = 360, M = W / 2;
      const int VB_X = 40, VB_Y = 20, VB_W = 280, VB_H = 28;
      const int CL_Y = 125;
      const int WD_Y = 165;
      const int DT_Y = 190;
      const int R1_Y = 215, R1_H = 42;
      const int R1_Y_IDLE = 260, R1_H_IDLE = 42;
      const int SH_X = 25, SH_W = 130;
      const int AL_X = 170, AL_W = 165;
      const int R2_Y = 270, R2_H = 50;
      const int PR_X = 20, PR_W = 95;
      const int PL_X = 125, PL_W = 110;
      const int NX_X = 245, NX_W = 95;

      it.fill(C_BLACK);
      auto t = id(esptime).now();
      if (!t.is_valid()) {
        it.print(M, CL_Y, id(font_time), TextAlign::CENTER, "--:--");
        return;
      }

      std::string st = id(ha_player_state).state;
      bool playing = (st == "playing");
      bool music_mode = (playing || st == "paused");
      float vol = id(ha_volume).get_state();
      if (isnan(vol)) vol = 0.5f;

      if (music_mode) {
      it.filled_rectangle(VB_X, VB_Y, VB_W, VB_H, C_VOL_BG);
      it.rectangle(VB_X, VB_Y, VB_W, VB_H, C_GRAY);
      int fw = (int)(VB_W * vol + 0.5f);
      if (fw > 0) {
        Color vc;
        if (vol < 0.33f) vc = C_GREEN;
        else if (vol < 0.66f) vc = C_YELLOW;
        else vc = C_RED;
        it.filled_rectangle(VB_X, VB_Y, fw, VB_H, vc);
      }
      {
        char lb[8];
        snprintf(lb, sizeof(lb), "%d%%", (int)(vol * 100 + 0.5f));
        it.print(VB_X + VB_W / 2, VB_Y + VB_H / 2, id(font_small), C_BLACK, TextAlign::CENTER, lb);
      }
      }
      {
        char lb[8];
        snprintf(lb, sizeof(lb), "%d%%", (int)(vol * 100 + 0.5f));
        it.print(VB_X + VB_W / 2, VB_Y + VB_H / 2, id(font_small), C_BLACK, TextAlign::CENTER, lb);
      }

      it.strftime(M, CL_Y, id(font_time), C_WHITE, TextAlign::CENTER, "%H:%M", t);

      if (playing || st == "paused") {
        std::string title = id(ha_title).state;
        std::string artist = id(ha_artist).state;
        std::string meta;
        if (!artist.empty() && !title.empty())
          meta = title + " - " + artist;
        else if (!title.empty())
          meta = title;
        else if (!artist.empty())
          meta = artist;

        if (!meta.empty()) {
          int max_chars = 28;
          if ((int)meta.length() <= max_chars) {
            it.print(M, DT_Y, id(font_date), C_WHITE, TextAlign::CENTER, meta.c_str());
          } else if (playing) {
            if (meta != id(last_meta)) {
              id(last_meta) = meta;
              id(marquee_offset) = 0;
            }
            id(marquee_offset) += 1;
            std::string buf = meta + "     ";
            int blen = buf.length();
            int pos = id(marquee_offset) % blen;
            std::string display;
            if (pos + max_chars <= blen) {
              display = buf.substr(pos, max_chars);
            } else {
              int first = blen - pos;
              display = buf.substr(pos, first);
              display.append(buf.substr(0, max_chars - first));
            }
            it.print(M, DT_Y, id(font_date), C_WHITE, TextAlign::CENTER, display.c_str());
          } else {
            it.print(M, DT_Y, id(font_date), C_DIM, TextAlign::CENTER, meta.c_str());
          }
        }
      } else {
        const char* wd[] = {"Sonntag", "Montag", "Dienstag", "Mittwoch",
                            "Donnerstag", "Freitag", "Samstag"};
        it.print(M, WD_Y, id(font_date), C_GRAY, TextAlign::CENTER, wd[t.day_of_week - 1]);
        it.strftime(M, DT_Y, id(font_date), C_GRAY, TextAlign::CENTER, "%d.%m.%Y", t);
        // Kalender-Termin
        std::string cal = id(ha_cal).state;
        if (!cal.empty() && cal != "—" && cal != "none" && cal != "unavailable") {
          int cal_y = 218;
          int cal_max = 34;
          if ((int)cal.length() <= cal_max) {
            it.print(M, cal_y, id(font_small), C_WHITE, TextAlign::CENTER, cal.c_str());
          } else {
            if (cal != id(last_meta)) {
              id(last_meta) = cal;
              id(marquee_offset) = 0;
            }
            id(marquee_offset) += 1;
            std::string buf = cal + "     ";
            int blen = buf.length();
            int pos = id(marquee_offset) % blen;
            std::string display;
            if (pos + cal_max <= blen) {
              display = buf.substr(pos, cal_max);
            } else {
              int first = blen - pos;
              display = buf.substr(pos, first);
              display.append(buf.substr(0, cal_max - first));
            }
            it.print(M, cal_y, id(font_small), C_WHITE, TextAlign::CENTER, display.c_str());
          }
        }
      }

      int r1y = music_mode ? R1_Y : R1_Y_IDLE;
      int r1h = music_mode ? R1_H : R1_H_IDLE;

      it.filled_rectangle(SH_X, r1y, SH_W, r1h, C_PURPLE);
      it.rectangle(SH_X, r1y, SH_W, r1h, C_GRAY);
      it.print(SH_X + SH_W / 2, r1y + r1h / 2, id(font_mdi), C_WHITE, TextAlign::CENTER, "\U000F0388");

      if (!music_mode) {
        bool alarm_on = id(alarm_switch).state;
        Color abg = alarm_on ? C_GOLD : C_DIM;
        Color afg = alarm_on ? C_BLACK : C_GRAY;
        it.filled_rectangle(AL_X, r1y, AL_W, r1h, abg);
        it.rectangle(AL_X, r1y, AL_W, r1h, C_GRAY);
        int s = 22, bx = AL_X + 8, by = r1y + (r1h - s) / 2;
        it.rectangle(bx, by, s, s, afg);
        if (alarm_on) {
          it.filled_rectangle(bx + 2, by + 2, s - 4, s - 4, C_GREEN);
          it.line(bx + 4, by + s / 2, bx + s / 3, by + s - 5, C_WHITE);
          it.line(bx + s / 3, by + s - 5, bx + s - 5, by + 5, C_WHITE);
        }
        it.print(AL_X + 56, r1y + r1h / 2, id(font_small), afg, TextAlign::CENTER, "Wecker");
      }

      if (music_mode) {

      it.filled_rectangle(PR_X, R2_Y, PR_W, R2_H, C_MEDIA_BG);
      it.rectangle(PR_X, R2_Y, PR_W, R2_H, C_DIM);
      it.print(PR_X + PR_W / 2, R2_Y + R2_H / 2, id(font_button), C_WHITE, TextAlign::CENTER, "|<");

      it.filled_rectangle(PL_X, R2_Y, PL_W, R2_H, C_BLUE);
      it.rectangle(PL_X, R2_Y, PL_W, R2_H, C_DIM);
      it.print(PL_X + PL_W / 2, R2_Y + R2_H / 2, id(font_button), C_WHITE, TextAlign::CENTER, playing ? "||" : ">");

      it.filled_rectangle(NX_X, R2_Y, NX_W, R2_H, C_MEDIA_BG);
      it.rectangle(NX_X, R2_Y, NX_W, R2_H, C_DIM);
      it.print(NX_X + NX_W / 2, R2_Y + R2_H / 2, id(font_button), C_WHITE, TextAlign::CENTER, ">|");
      }

      // Touch-Feedback: kurz aufleuchten
      if (id(flash_counter) > 0) {
        it.filled_rectangle(id(flash_x), id(flash_y), id(flash_w), id(flash_h), C_DIM);
        id(flash_counter)--;
      }

output:
  - platform: ledc
    pin: $PIN_LCD_BL
    id: backlight_output

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON

time:
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - component.update: main_display

touchscreen:
  - platform: cst816
    id: touch
    interrupt_pin:
      number: $PIN_TOUCH_INT
    reset_pin:
      pca9554: pca9554_device
      number: 0
    i2c_id: bus_int
    display: main_display
    on_touch:
      lambda: |-
        int x = touch.y;
        int y = 359 - touch.x;

        if (y >= 20 && y <= 48 && x >= 28 && x <= 332) {
          id(flash_x) = 28; id(flash_y) = 20; id(flash_w) = 304; id(flash_h) = 28;
          id(flash_counter) = 2;
          float cur = id(ha_volume).get_state();
          if (isnan(cur)) cur = 0.5f;
          float step;
          if (cur <= 0.10f) step = 0.01f;
          else if (cur <= 0.50f) step = 0.02f;
          else step = 0.05f;
          float nv = (x < 180) ? cur - step : cur + step;
          if (nv < 0.0f) nv = 0.0f;
          if (nv > 1.0f) nv = 1.0f;
          id(target_volume) = nv;
          id(script_set_volume).execute();
        }
        else if (y >= 215 && y <= 257) {
          if (x >= 25 && x <= 155) {
            id(flash_x) = 25; id(flash_y) = 215; id(flash_w) = 130; id(flash_h) = 42;
            id(flash_counter) = 2;
            std::string ps = id(ha_player_state).state;
            if (ps == "playing" || ps == "paused")
              id(script_stop_music).execute();
            else
              id(script_start_random).execute();
          } else if (x >= 170 && x <= 335) {
            id(flash_x) = 170; id(flash_y) = 215; id(flash_w) = 165; id(flash_h) = 42;
            id(flash_counter) = 2;
            id(alarm_switch).toggle();
          }
        }
        else if (y >= 270 && y <= 320) {
          if (x >= 125 && x <= 235) {
            id(flash_x) = 125; id(flash_y) = 270; id(flash_w) = 110; id(flash_h) = 50;
            id(flash_counter) = 2;
            id(script_play_pause).execute();
          } else if (x >= 20 && x <= 115) {
            id(flash_x) = 20; id(flash_y) = 270; id(flash_w) = 95; id(flash_h) = 50;
            id(flash_counter) = 2;
            id(script_previous).execute();
          } else if (x >= 245 && x <= 340) {
            id(flash_x) = 245; id(flash_y) = 270; id(flash_w) = 95; id(flash_h) = 50;
            id(flash_counter) = 2;
            id(script_next).execute();
          }
        }
        id(main_display).update();

