substitutions:
  devicename: "esp32_s3_1"
  upper_devicename: "ESP32 S3 1"
  devicecomment: "David Wecker - Sendspin Radio + Display (Waveshare ESP32-S3 Touch-LCD 1.85)"

  # ── HA entity IDs (anpassen pro Gerät) ──
  ha_media_player: "media_player.david_wecker"
  ha_media_player_speaker: "media_player.david_wecker_lautsprecher"
  ha_target_player: "media_player.david_lautsprecher"
  ha_alarm_automation: "automation.david_wecken"
  ha_random_script: "script.musik_start_zufallslieder"
  ha_calendar_sensor: "sensor.david_kalender"

  # ── Display ──
  display_rotation: "90°"

  # Display (ST77916, QSPI, 360x360 round)
  PIN_LCD_SDA0: GPIO46
  PIN_LCD_SDA1: GPIO45
  PIN_LCD_SDA2: GPIO42
  PIN_LCD_SDA3: GPIO41
  PIN_LCD_SCK: GPIO40
  PIN_LCD_CS: GPIO21
  PIN_LCD_BL: GPIO5
  # LCD_RST -> PCA9554 pin 1
  # TP_RST  -> PCA9554 pin 0

  # Audio DAC (ES8311, I2S)
  PIN_I2S_MCLK: GPIO2
  PIN_I2S_BCLK: GPIO48
  PIN_I2S_LRCK: GPIO38
  PIN_I2S_DOUT: GPIO47

  # I2C (shared bus: touch, IMU, RTC, GPIO expander, ES8311, ES7210)
  PIN_I2C_SCL: GPIO10
  PIN_I2C_SDA: GPIO11

  # TF Card (SDMMC 4-bit)
  PIN_SD_CLK: GPIO15
  PIN_SD_CMD: GPIO14
  PIN_SD_D0: GPIO16
  PIN_SD_D1: GPIO17
  PIN_SD_D2: GPIO12
  PIN_SD_D3: GPIO13

  # Buttons
  PIN_BOOT: GPIO0

  # Touch
  PIN_TOUCH_INT: GPIO4

  # RTC
  PIN_RTC_INT: GPIO6

  # Backlight PWM
  PIN_LCD_BL_PWM: GPIO5

<<: !include common/esp32-s3.yaml

# Status-LED auf GPIO19 (unused, kein physischer Pin) – deaktiviert die blaue LED auf GPIO2
status_led:
  pin:
    number: GPIO19
    inverted: False

esphome:
  friendly_name: "David Wecker"

i2c:
  sda: $PIN_I2C_SDA
  scl: $PIN_I2C_SCL
  scan: true
  id: bus_int
  frequency: 400kHz

pca9554:
  - id: pca9554_device
    i2c_id: bus_int

i2s_audio:
  i2s_lrclk_pin: $PIN_I2S_LRCK
  i2s_bclk_pin: $PIN_I2S_BCLK

speaker:
  - platform: i2s_audio
    id: speaker_id
    dac_type: external
    i2s_dout_pin: $PIN_I2S_DOUT
    channel: left

sendspin:
  id: sendspin_hub

media_source:
  - platform: sendspin
    id: sendspin_source

media_player:
  - platform: speaker_source
    name: "David Wecker"
    id: sendspin_player
    media_pipeline:
      speaker: speaker_id
      sources:
        - sendspin_source
  - platform: speaker
    id: local_media_player
    name: "David Wecker Lautsprecher"
    announcement_pipeline:
      speaker: speaker_id

script:
  - id: script_play_pause
    then:
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: ${ha_target_player}
      - component.update: main_display
  - id: script_next
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: ${ha_target_player}
      - component.update: main_display
  - id: script_previous
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: ${ha_target_player}
      - component.update: main_display
  - id: script_set_volume
    then:
      - homeassistant.service:
          service: media_player.volume_set
          data:
            entity_id: ${ha_target_player}
            volume_level: !lambda 'return id(target_volume);'
      - component.update: main_display
  - id: script_start_random
    then:
      - homeassistant.service:
          service: ${ha_random_script}
          data:
            target_player: ${ha_target_player}
  - id: script_stop_music
    then:
      - homeassistant.service:
          service: media_player.media_stop
          data:
            entity_id: ${ha_target_player}
      - component.update: main_display

globals:
  - id: marquee_offset
    type: int
    initial_value: '0'
  - id: last_meta
    type: std::string
    initial_value: ''
  - id: target_volume
    type: float
    initial_value: '0.5'
  - id: flash_counter
    type: int
    initial_value: '0'
  - id: flash_x
    type: int
    initial_value: '0'
  - id: flash_y
    type: int
    initial_value: '0'
  - id: flash_w
    type: int
    initial_value: '0'
  - id: flash_h
    type: int
    initial_value: '0'

spi:
  id: display_qspi
  type: quad
  clk_pin: $PIN_LCD_SCK
  data_pins:
    - $PIN_LCD_SDA0
    - $PIN_LCD_SDA1
    - $PIN_LCD_SDA2
    - $PIN_LCD_SDA3

display:
  - platform: qspi_dbi
    id: main_display
    model: CUSTOM
    rotation: ${display_rotation}
    data_rate: 80MHz
    cs_pin: $PIN_LCD_CS
    update_interval: 200ms
    spi_id: display_qspi
    color_order: rgb
    dimensions:
      height: 360
      width: 360
    invert_colors: true
    reset_pin:
      pca9554: pca9554_device
