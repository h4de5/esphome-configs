text_sensor:
  - platform: homeassistant
    entity_id: ${ha_target_player}
    id: ha_player_state
  - platform: homeassistant
    entity_id: ${ha_target_player}
    attribute: media_title
    id: ha_title
  - platform: homeassistant
    entity_id: ${ha_target_player}
    attribute: media_artist
    id: ha_artist
  - platform: homeassistant
    entity_id: ${ha_calendar_sensor}
    id: ha_cal

sensor:
  - platform: homeassistant
    entity_id: ${ha_target_player}
    attribute: volume_level
    id: ha_volume

number:
  - platform: template
    name: "Lautstärke"
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 1
    step: 0.05
    lambda: |-
      return id(ha_volume).get_state();
    set_action:
      - homeassistant.service:
          service: media_player.volume_set
          data:
            entity_id: ${ha_target_player}
            volume_level: !lambda 'return x;'

switch:
  - platform: homeassistant
    entity_id: ${ha_alarm_automation}
    id: alarm_switch
    name: "Wecker Alarm"
    on_state:
      then:
        - component.update: main_display

button:
  - platform: template
    name: "Zufallswiedergabe"
    icon: "mdi:shuffle"
    on_press:
      - homeassistant.service:
          service: ${ha_random_script}
          data:
            target_player: ${ha_target_player}
  - platform: template
    name: "Musik Stop"
    icon: "mdi:stop"
    on_press:
      - homeassistant.service:
          service: media_player.media_stop
          data:
            entity_id: ${ha_target_player}
